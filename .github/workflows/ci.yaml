# ════════════════════════════════════════════════════════════════
# CI Pipeline — orderly-app
#
# Trigger: push to main, pull requests to main
# Flow: Test → Build & Scan → Push to ECR → Update GitOps Repo
# ════════════════════════════════════════════════════════════════

name: CI Pipeline

# ──────────────────────────────────────────────
# TRIGGERS
# ──────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "infrastructure/**"
      - "LICENSE"

  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "infrastructure/**"
      - "LICENSE"


# ──────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ──────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: orderly-app


# ══════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────
  # JOB 1: TEST
  # ────────────────────────────────────────────
  test:
    name: "Test & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-line-length=120 --statistics

      - name: Run tests with pytest
        run: |
          python -m pytest app/tests/ -v --tb=short


  # ────────────────────────────────────────────
  # JOB 2: BUILD, SCAN, AND PUSH
  # ────────────────────────────────────────────
  build-scan-push:
    name: "Build, Scan & Push"
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: test

    outputs:
      image_tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image will be tagged as: ${IMAGE_TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}
        run: |
          docker build \
            -t ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG} \
            -t ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest \
            .
          docker images ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG} --format "{{.Size}}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.IMAGE_TAG }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL"
          timeout: 5m0s

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}
        run: |
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest


  # ────────────────────────────────────────────
  # JOB 3: UPDATE GITOPS REPOSITORY
  # ────────────────────────────────────────────
  update-gitops:
    name: "Update GitOps Repo"
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: build-scan-push

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: rahmansabiurfx/orderly-app-gitops
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      - name: Update image tag
        run: |
          NEW_TAG="${{ needs.build-scan-push.outputs.image_tag }}"
          echo "Updating image tag to: ${NEW_TAG}"
          sed -i "s|  tag: \".*\"|  tag: \"${NEW_TAG}\"|" helm-chart/values.yaml
          cat helm-chart/values.yaml

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-chart/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit — image tag is already up to date"
          else
            git commit -m "Update orderly-app image tag to ${{ needs.build-scan-push.outputs.image_tag }}

          Triggered by: ${{ github.repository }}@${{ github.sha }}
          Workflow: ${{ github.workflow }} #${{ github.run_number }}"

            git push
          fi