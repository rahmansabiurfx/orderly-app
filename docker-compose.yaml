services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: orderly-app
    ports:
      - "8080:8080"

    environment:
      - APP_NAME=orderly-app
      - APP_VERSION=0.1.0
      - ENVIRONMENT=docker-compose

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M